<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Management Dashboard</title>
<style>
:root {
  --bg: #f5f5f4;
  --surface: #ffffff;
  --surface2: #eeeeeb;
  --border: #ddd9d3;
  --text: #2c2c2c;
  --text-dim: #888580;
  --accent: #6b6b6b;
  --accent-glow: rgba(107, 107, 107, 0.15);
  --green: #5a9a6e;
  --green-dim: rgba(90, 154, 110, 0.1);
  --orange: #c4873b;
  --orange-dim: rgba(196, 135, 59, 0.1);
  --red: #c25d5d;
  --red-dim: rgba(194, 93, 93, 0.1);
  --blue: #5b8ab5;
  --blue-dim: rgba(91, 138, 181, 0.1);
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
}

/* ===== HEADER ===== */
.app-header {
  padding: 20px 24px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.app-header h1 {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text);
}
.header-actions {
  display: flex;
  gap: 8px;
}
.btn-icon {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  width: 36px;
  height: 36px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  transition: all 0.2s;
}
.btn-icon:hover { background: var(--surface2); color: var(--text); }

/* ===== BRAIN DUMP ===== */
.brain-dump {
  margin: 16px 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  transition: border-color 0.3s;
}
.brain-dump:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.brain-dump-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.brain-dump-header h2 {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 6px;
}
.top-toggle {
  display: flex;
  gap: 4px;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 3px;
}
.top-toggle-btn {
  background: none;
  border: none;
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
}
.top-toggle-btn.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}
.top-toggle-btn:hover:not(.active) {
  color: var(--text);
}
.brain-dump textarea {
  width: 100%;
  min-height: 80px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 12px;
  font-family: inherit;
  font-size: 0.95rem;
  resize: vertical;
  outline: none;
}
.brain-dump textarea::placeholder { color: var(--text-dim); }
.brain-dump-actions {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  align-items: center;
}
.btn {
  padding: 8px 20px;
  border-radius: var(--radius-sm);
  border: none;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-primary {
  background: var(--accent);
  color: white;
}
.btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
.btn-ghost {
  background: transparent;
  color: var(--text-dim);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--surface2); color: var(--text); }
.dump-hint {
  color: var(--text-dim);
  font-size: 0.8rem;
  margin-left: auto;
}

/* ===== INBOX TRIAGE ===== */
.inbox-bar {
  margin: 0 24px 8px;
  background: var(--orange-dim);
  border: 1px solid rgba(251, 146, 60, 0.3);
  border-radius: var(--radius);
  padding: 12px 16px;
  display: none;
}
.inbox-bar.visible { display: block; }
.inbox-bar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.inbox-bar-header h3 {
  font-size: 0.9rem;
  color: var(--orange);
  display: flex;
  align-items: center;
  gap: 6px;
}
.inbox-count {
  background: var(--orange);
  color: var(--bg);
  font-size: 0.75rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 99px;
}
.inbox-bulk-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  padding: 6px 0;
}
.inbox-select-all {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.8rem;
  color: var(--text-dim);
  cursor: pointer;
}
.inbox-select-all input[type="checkbox"] {
  width: 16px;
  height: 16px;
  cursor: pointer;
  accent-color: var(--orange);
}
.inbox-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: var(--surface);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  border: 1px solid var(--border);
}
.inbox-item input[type="checkbox"] {
  width: 16px;
  height: 16px;
  cursor: pointer;
  accent-color: var(--orange);
  flex-shrink: 0;
}
.btn-danger {
  background: var(--red-dim);
  color: var(--red);
  border: 1px solid rgba(194, 93, 93, 0.3);
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 0.8rem;
  cursor: pointer;
  font-weight: 600;
}
.btn-danger:hover { background: var(--red); color: white; }
.inbox-item-text {
  flex: 1;
  font-size: 0.9rem;
  cursor: text;
  border-radius: 4px;
  padding: 2px 4px;
  margin: -2px -4px;
}
.inbox-item-text:hover { background: rgba(0,0,0,0.04); }
.inbox-item select {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 0.8rem;
  cursor: pointer;
  max-width: 180px;
}
.inbox-item .btn-assign {
  background: var(--accent);
  color: white;
  border: none;
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 0.8rem;
  cursor: pointer;
  font-weight: 600;
}
.inbox-item .btn-assign:hover { filter: brightness(1.15); }

/* ===== TABS ===== */
.tabs {
  display: flex;
  gap: 4px;
  margin: 8px 24px;
  background: var(--surface);
  border-radius: var(--radius);
  padding: 4px;
  border: 1px solid var(--border);
}
.tab {
  flex: 1;
  padding: 10px 16px;
  text-align: center;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text-dim);
  transition: all 0.2s;
  border: none;
  background: transparent;
}
.tab:hover { color: var(--text); background: var(--surface2); }
.tab.active {
  background: var(--text);
  color: var(--bg);
  font-weight: 600;
}

/* ===== TAB CONTENT ===== */
.tab-content { display: none; padding: 0 24px 24px; }
.tab-content.active { display: block; }

/* ===== DASHBOARD ===== */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
}
.stat-number {
  font-size: 2rem;
  font-weight: 700;
  line-height: 1;
}
.stat-number.accent { color: var(--accent); }
.stat-number.green { color: var(--green); }
.stat-number.orange { color: var(--orange); }
.stat-number.blue { color: var(--blue); }
.stat-label {
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-top: 4px;
}
.section-title {
  font-size: 1.1rem;
  font-weight: 700;
  margin: 20px 0 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.project-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.project-mini-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s;
}
.project-mini-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}
.project-mini-title {
  font-weight: 600;
  font-size: 1rem;
  margin-bottom: 8px;
}
.project-mini-next {
  font-size: 0.85rem;
  color: var(--green);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.progress-bar-track {
  height: 6px;
  background: var(--surface2);
  border-radius: 99px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--blue), var(--green));
  border-radius: 99px;
  transition: width 0.5s ease;
}
.progress-text {
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-top: 4px;
  text-align: right;
}

/* ===== RUNNING LISTS ===== */
.running-lists-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 16px;
}
.list-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.list-card-header {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.list-card-title {
  font-weight: 600;
  font-size: 0.95rem;
  display: flex;
  align-items: center;
  gap: 8px;
}
.list-card-count {
  background: var(--surface2);
  color: var(--text-dim);
  font-size: 0.75rem;
  padding: 2px 8px;
  border-radius: 99px;
  font-weight: 600;
}
.list-card-items { padding: 8px; transition: outline 0.15s, background 0.15s; }
.list-card-items.drag-target-active,
.day-slot.drag-target-active {
  outline: 2px dashed var(--accent);
  outline-offset: -2px;
  background: rgba(196,135,59,0.05);
}
.task-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
  cursor: grab;
  position: relative;
}
.task-item:active { cursor: grabbing; }
.task-item:hover { background: var(--surface2); }
.task-item.done { opacity: 0.4; }
.task-item.done .task-text { text-decoration: line-through; }
.task-item.dragging {
  opacity: 0.4;
  background: var(--surface2);
}
.task-item.drag-over-top {
  box-shadow: 0 -2px 0 0 var(--accent) inset;
}
.task-item.drag-over-bottom {
  box-shadow: 0 2px 0 0 var(--accent) inset;
}
.task-checkbox {
  width: 20px;
  height: 20px;
  border-radius: 6px;
  border: 2px solid var(--border);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
  background: transparent;
  color: transparent;
  font-size: 0.7rem;
}
.task-checkbox:hover { border-color: var(--accent); }
.task-checkbox.checked {
  background: var(--green);
  border-color: var(--green);
  color: var(--bg);
}
.task-text { flex: 1; font-size: 0.9rem; cursor: text; border-radius: 4px; padding: 2px 4px; margin: -2px -4px; }
.task-text:hover { background: rgba(0,0,0,0.04); }
.inline-edit {
  width: 100%;
  font-size: inherit;
  font-family: inherit;
  padding: 2px 6px;
  border: 1px solid var(--accent);
  border-radius: 4px;
  outline: none;
  background: var(--bg);
  color: var(--text);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.project-title { cursor: text; border-radius: 4px; padding: 2px 4px; margin: -2px -4px; }
.project-title:hover { background: rgba(0,0,0,0.04); }
.task-move {
  opacity: 0;
  background: none;
  border: none;
  color: var(--accent);
  cursor: pointer;
  font-size: 0.85rem;
  padding: 2px 4px;
  border-radius: 4px;
  transition: all 0.15s;
}
.task-item:hover .task-move { opacity: 0.6; }
.task-move:hover { opacity: 1 !important; background: var(--accent-dim); }
.task-delete {
  opacity: 0;
  background: none;
  border: none;
  color: var(--red);
  cursor: pointer;
  font-size: 0.85rem;
  padding: 2px 4px;
  border-radius: 4px;
  transition: all 0.15s;
}
.task-item:hover .task-delete { opacity: 0.6; }
.task-delete:hover { opacity: 1 !important; background: var(--red-dim); }

/* Move-to picker dropdown */
.move-picker-overlay {
  position: fixed;
  inset: 0;
  z-index: 999;
}
.move-picker {
  position: fixed;
  z-index: 1000;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  min-width: 200px;
  max-height: 320px;
  overflow-y: auto;
  padding: 6px 0;
}
.move-picker-title {
  padding: 6px 14px;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.move-picker-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  font-size: 0.85rem;
  cursor: pointer;
  transition: background 0.1s;
}
.move-picker-item:hover {
  background: var(--surface2);
}
.move-picker-item.current {
  opacity: 0.4;
  pointer-events: none;
}
.move-picker-divider {
  height: 1px;
  background: var(--border);
  margin: 4px 0;
}
.add-task-row {
  display: flex;
  gap: 6px;
  padding: 8px;
  border-top: 1px solid var(--border);
}
.add-task-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 10px;
  border-radius: 6px;
  font-size: 0.85rem;
  outline: none;
}
.add-task-input:focus { border-color: var(--accent); }
.add-task-input::placeholder { color: var(--text-dim); }
.add-task-btn {
  background: var(--accent);
  color: white;
  border: none;
  width: 32px;
  height: 32px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 1.1rem;
  display: flex;
  align-items: center;
  justify-content: center;
}
.add-task-btn:hover { filter: brightness(1.15); }

/* ===== PROJECTS ===== */
.projects-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.project-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.project-header {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
}
.project-expand {
  color: var(--text-dim);
  font-size: 0.85rem;
  transition: transform 0.3s;
  flex-shrink: 0;
}
.project-card.expanded .project-expand { transform: rotate(90deg); }
.project-title {
  font-weight: 600;
  font-size: 0.95rem;
}
.project-next-preview {
  padding: 8px 16px;
  font-size: 0.85rem;
  color: var(--green);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  border-bottom: 1px solid var(--border);
}
.project-card.expanded .project-next-preview { display: none; }
.project-progress-mini {
  width: 60px;
}
.project-body {
  display: none;
}
.project-card.expanded .project-body { display: block; }
.project-card.project-paused { opacity: 0.5; }
.project-notes {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 10px;
  font-family: inherit;
  font-size: 0.85rem;
  resize: vertical;
  min-height: 60px;
  margin-bottom: 12px;
  outline: none;
}
.project-notes:focus { border-color: var(--accent); }
.project-notes::placeholder { color: var(--text-dim); }
.next-action-edit {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  align-items: center;
}
.next-action-label {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--green);
  white-space: nowrap;
}
.next-action-input {
  flex: 1;
  background: var(--green-dim);
  border: 1px solid rgba(74, 222, 128, 0.3);
  color: var(--text);
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 0.85rem;
  outline: none;
}
.next-action-input:focus { border-color: var(--green); }
.add-project-btn {
  margin-top: 12px;
}

/* ===== MODALS ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-overlay.visible { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  width: 90%;
  max-width: 450px;
  box-shadow: var(--shadow);
}
.modal h3 {
  margin-bottom: 16px;
  font-size: 1.1rem;
}
.modal input, .modal select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  margin-bottom: 12px;
  outline: none;
}
.modal input:focus { border-color: var(--accent); }
.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 8px;
}

/* ===== COMPLETED SECTION ===== */
.completed-section {
  margin: 0 24px 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.completed-header {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  background: var(--green-dim);
  border-bottom: 1px solid rgba(90, 154, 110, 0.2);
}
.completed-header h3 {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--green);
  display: flex;
  align-items: center;
  gap: 6px;
}
.completed-header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}
.completed-count {
  background: var(--green);
  color: white;
  font-size: 0.75rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 99px;
}
.completed-expand {
  color: var(--green);
  font-size: 0.85rem;
  transition: transform 0.3s;
}
.completed-section.expanded .completed-expand { transform: rotate(90deg); }
.completed-body {
  display: none;
  max-height: 400px;
  overflow-y: auto;
}
.completed-section.expanded .completed-body { display: block; }
.completed-group-label {
  padding: 8px 16px 4px;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.completed-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 16px;
  font-size: 0.85rem;
  color: var(--text-dim);
}
.completed-item .task-checkbox {
  width: 18px;
  height: 18px;
  font-size: 0.65rem;
}
.completed-item-text {
  flex: 1;
  text-decoration: line-through;
}
.completed-source {
  font-size: 0.7rem;
  background: var(--surface2);
  padding: 1px 6px;
  border-radius: 4px;
  white-space: nowrap;
}

/* ===== SUB-LISTS ===== */
.sublist-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  cursor: pointer;
  user-select: none;
  border-radius: var(--radius-sm);
  transition: background 0.15s;
}
.sublist-header:hover { background: var(--surface2); }
.sublist-arrow {
  font-size: 0.75rem;
  transition: transform 0.2s;
  display: inline-block;
  color: var(--text-dim);
}
.sublist-header.expanded .sublist-arrow { transform: rotate(90deg); }

/* ===== PIN MODAL ===== */
.pin-overlay {
  position: fixed;
  inset: 0;
  background: rgba(90, 154, 110, 0.15);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2000;
}
.pin-overlay.hidden { display: none; }
.pin-modal {
  background: linear-gradient(145deg, #f0f7f2, #ffffff);
  border: 2px solid rgba(90, 154, 110, 0.25);
  border-radius: 20px;
  padding: 36px 32px;
  max-width: 340px;
  width: 90%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(90, 154, 110, 0.2), 0 4px 12px rgba(0,0,0,0.05);
}
.pin-modal-icon {
  font-size: 2.5rem;
  margin-bottom: 8px;
}
.pin-modal h2 {
  margin: 0 0 6px;
  font-size: 1.2rem;
  color: #3a6b4a;
}
.pin-modal p {
  color: #7a9e87;
  font-size: 0.82rem;
  margin: 0 0 22px;
  line-height: 1.4;
}
.pin-input {
  width: 100%;
  padding: 14px;
  font-size: 1.5rem;
  text-align: center;
  border: 2px solid rgba(90, 154, 110, 0.3);
  border-radius: 12px;
  letter-spacing: 8px;
  font-weight: 700;
  box-sizing: border-box;
  background: white;
  -moz-appearance: textfield;
  transition: border-color 0.2s;
}
.pin-input::-webkit-outer-spin-button,
.pin-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.pin-input:focus {
  outline: none;
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(90, 154, 110, 0.15);
}
.pin-submit {
  width: 100%;
  padding: 13px;
  margin-top: 16px;
  background: linear-gradient(135deg, #5a9a6e, #4a8a5e);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.2s;
  box-shadow: 0 4px 12px rgba(90, 154, 110, 0.3);

.pin-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(90, 154, 110, 0.4); }
.pin-submit:active { transform: translateY(0); }
.pin-skip {
  display: block;

  margin-top: 14px;
  background: none;
  border: none;

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;

  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  font-weight: 500;
  z-index: 200;
  transform: translateY(80px);

  box-shadow: var(--shadow);
}
.toast.visible { transform: translateY(0); opacity: 1; }

.week-plan-header {

}

let userPin = localStorage.getItem('life-checklist-pin') || null;

function showPinModal() {
  document.getElementById('pinOverlay').classList.remove('hidden');
  document.getElementById('pinInput').value = '';
  document.getElementById('pinInput').focus();
}

function submitPin() {
  const pin = document.getElementById('pinInput').value.trim();
  if (!pin || pin.length < 4) {
    toast('Enter at least 4 digits');
    return;
  }
  userPin = pin;
  localStorage.setItem('life-checklist-pin', pin);
  document.getElementById('pinOverlay').classList.add('hidden');
  updateSyncIcon(true);
  init();
}

function skipPin() {
  userPin = null;
  localStorage.removeItem('life-checklist-pin');
  document.getElementById('pinOverlay').classList.add('hidden');
  updateSyncIcon(false);
  initLocal();
}

function updateSyncIcon(syncing) {
  const btn = document.getElementById('syncStatus');
  btn.textContent = syncing ? '🔄' : '🔒';
  btn.title = syncing ? 'Syncing (click to change PIN)' : 'Not syncing (click to enter PIN)';
}

async function init() {
  if (!userPin) {
    // Show PIN modal on first visit, otherwise load local
    const saved = localStorage.getItem('life-checklist');
    if (saved) {
      initLocal();
    } else {
      showPinModal();
    }
    return;
  }

  document.getElementById('pinOverlay').classList.add('hidden');
  updateSyncIcon(true);

  try {
    const res = await fetch('/api/tasks', {
      headers: { 'X-Pin': userPin }
    });
    if (res.ok) {
      const serverData = await res.json();
      if (serverData && serverData.runningLists) {
        data = serverData;
        localStorage.setItem('life-checklist', JSON.stringify(data));
      } else {
        // New PIN — no data on server yet, use local or defaults
        const saved = localStorage.getItem('life-checklist');
        if (saved) data = JSON.parse(saved);
        save(); // push local data to server
      }
    } else {
      // 404 = new PIN, push local data up
      const saved = localStorage.getItem('life-checklist');
      if (saved) data = JSON.parse(saved);
      save();
    }
  } catch {
    // Offline — use localStorage
    const saved = localStorage.getItem('life-checklist');
    if (saved) data = JSON.parse(saved);
  }

  if (!data.weekPlan) data.weekPlan = {};
  if (!data.weekPlanSettings) data.weekPlanSettings = { deepWorkDays: [2, 3, 4] };
  if (!data.runningLists.delegate) data.runningLists.delegate = [];
  render();
}

function initLocal() {
  updateSyncIcon(false);
  const saved = localStorage.getItem('life-checklist');
  if (saved) data = JSON.parse(saved);
  if (!data.weekPlan) data.weekPlan = {};
  if (!data.runningLists.delegate) data.runningLists.delegate = [];
  if (!data.weekPlanSettings) data.weekPlanSettings = { deepWorkDays: [2, 3, 4] };
  render();
}

// ===== SAVE =====
async function save() {
  localStorage.setItem('life-checklist', JSON.stringify(data));
  if (!userPin) return; // local-only mode
  try {
    await fetch('/api/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Pin': userPin },
      body: JSON.stringify(data)
    });
  } catch { /* offline mode — localStorage only */ }
}

  calls: ['call', 'phone', 'text ', 'message', 'msg', 'reach out', 'contact', 'voicemail', 'dm ', 'reply to', 'ask about', 'tell ', 'let them know', 'check with'],
  errands: ['buy', 'pick up', 'pickup', 'drop off', 'dropoff', 'return ', 'grocery', 'groceries', 'store', 'shop', 'mail', 'post office', 'deposit', 'pharmacy', 'dry clean', 'library', 'bank', 'car wash', 'gas ', 'fill up', 'get ', 'go to ', 'stop by', 'swing by', 'grab ', 'bring ', 'take to', 'ship ', 'send package', 'fedex', 'ups', 'dmv', 'vet', 'dentist', 'doctor', 'appointment', 'haircut', 'oil change', 'tire', 'renew', 'notary'],
  home: ['fix', 'clean', 'repair', 'mow', 'lawn', 'garage', 'kitchen', 'bathroom', 'bedroom', 'laundry', 'dishes', 'vacuum', 'organize closet', 'trash', 'recycling', 'garden', 'paint', 'install', 'replace filter', 'declutter', 'tidy', 'sweep', 'mop', 'dust', 'scrub', 'weed', 'water plant', 'change sheets', 'light bulb', 'unclog', 'sort through'],
  computer: ['email', 'download', 'website', 'online', 'subscribe', 'unsubscribe', 'cancel subscription', 'update account', 'password', 'sign up', 'log in', 'research', 'google', 'look up', 'book online', 'schedule online', 'pay bill', 'transfer', 'venmo', 'zelle', 'invoice', 'spreadsheet', 'fill out form', 'apply for', 'submit', 'upload', 'backup'],
  waitingOn: ['waiting', 'pending', 'follow up', 'followup', 'hear back', 'expecting', 'check on', 'check in with', 'remind ', 'need response', 'awaiting'],

  recommendations: ['recommend', 'suggested', 'check out', 'watch', 'listen to', 'read ', 'book:', 'movie:', 'show:', 'podcast:', 'music:', 'album:'],

  friendAgendas: ['talk to', 'discuss with', 'bring up with', 'agenda:', 'mention to']

function categorizeItem(text) {
  const lower = text.toLowerCase();

  // Check if it matches a project name (fuzzy)
  for (const proj of data.projects) {
    const projWords = proj.title.toLowerCase().split(/\s+/);
    const matchCount = projWords.filter(w => w.length > 3 && lower.includes(w)).length;
    if (matchCount >= 1 && projWords.length <= 3 || matchCount >= 2) {
      return { type: 'proj', id: proj.id };
    }
  }

  // Check keyword lists (use word boundary so 'mail' doesn't match inside 'email')
  for (const [category, keywords] of Object.entries(CATEGORY_KEYWORDS)) {
    for (const kw of keywords) {
      const kwTrimmed = kw.trim();
      const re = new RegExp('(?:^|\\W)' + kwTrimmed.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '(?:\\W|$)', 'i');
      if (re.test(lower)) {
        return { type: 'list', id: category };
      }
    }
  }

  return null; // couldn't categorize
}

// ===== BRAIN DUMP =====
function processDump() {
  const area = document.getElementById('dumpArea');
  // Snapshot before organizing (for undo)
  lastDumpSnapshot = { data: JSON.stringify(data), text: area.value };
  const rawLines = area.value.split('\n');
  if (!rawLines.length) return;

  // Parse: main lines + indented sub-lines (tab or 2+ spaces)
  const entries = [];
  for (const raw of rawLines) {
    const trimmed = raw.trim();
    if (!trimmed) continue;
    const isIndented = raw.startsWith('\t') || raw.startsWith('  ');
    if (isIndented && entries.length > 0) {
      entries[entries.length - 1].subs.push(trimmed);
    } else {
      entries.push({ text: trimmed, subs: [] });
    }
  }
  if (!entries.length) return;

  let sorted = 0;
  let unsorted = 0;
  const sortLog = []; // track where each item went

  for (const entry of entries) {
    const match = categorizeItem(entry.text);
    // If it has sub-items, treat it as a project
    if (entry.subs.length > 0 && !match) {
      // Auto-create a project from this entry
      const projId = uid();
      const tasks = entry.subs.map(s => ({ id: uid(), text: s, done: false }));
      data.projects.push({
        id: projId,
        title: entry.text,
        nextAction: entry.subs[0] || '',
        tasks,
        notes: '',
        created: new Date().toISOString().split('T')[0]
      });
      sortLog.push(`📁 NEW PROJECT: "${entry.text}" (${entry.subs.length} sub-tasks)`);
      sorted += 1 + entry.subs.length;
    } else if (entry.subs.length > 0 && match && match.type === 'proj') {
      // Add sub-items to matched project
      const proj = data.projects.find(p => p.id === match.id);
      if (proj) {
        for (const s of entry.subs) {
          proj.tasks.push({ id: uid(), text: s, done: false });
        }
        sortLog.push(`📁 → "${proj.title}": added ${entry.subs.length} sub-tasks`);
        sorted += 1 + entry.subs.length;
      }
    } else if (match) {
      const task = { id: uid(), text: entry.text, done: false };
      if (match.type === 'list') {
        data.runningLists[match.id].push(task);
        const meta = LIST_META[match.id];
        sortLog.push(`${meta.emoji} ${meta.label}: "${entry.text}"`);
      } else if (match.type === 'proj') {
        const proj = data.projects.find(p => p.id === match.id);
        if (proj) {
          proj.tasks.push(task);
          sortLog.push(`📁 → "${proj.title}": "${entry.text}"`);
        }
      }
      sorted++;
    } else {
      data.inbox.push(entry.text);
      unsorted++;
    }
  }

  area.value = '';
  save();
  render();

  // Show sort summary
  if (sortLog.length > 0) {
    showSortSummary(sortLog, sorted, unsorted);
  }
}

function toggleSelectAllInbox() {
  const checked = document.getElementById('inboxSelectAll').checked;
  document.querySelectorAll('.inbox-check').forEach(cb => cb.checked = checked);
}

function deleteSelectedInbox() {
  const checks = document.querySelectorAll('.inbox-check:checked');
  if (!checks.length) { toast('Nothing selected'); return; }
  // Collect indices in reverse order so splicing doesn't shift them
  const indices = Array.from(checks).map(cb => parseInt(cb.dataset.index)).sort((a, b) => b - a);
  for (const i of indices) {
    data.inbox.splice(i, 1);
  }
  save();
  render();
  toast(`${indices.length} item${indices.length > 1 ? 's' : ''} deleted`);
}

function assignInboxItem(index) {
  const select = document.getElementById(`assign-target-${index}`);
  const target = select.value;
  const text = data.inbox[index];

  if (target.startsWith('list:')) {
    const listKey = target.split(':')[1];
    data.runningLists[listKey].push({ id: uid(), text, done: false });
  } else if (target.startsWith('proj:')) {
    const projId = target.split(':')[1];
    const proj = data.projects.find(p => p.id === projId);
    if (proj) proj.tasks.push({ id: uid(), text, done: false });
  }

  data.inbox.splice(index, 1);
  save();
  render();
}

function startEditInboxItem(index, el) {
  if (el.querySelector('input')) return;
  const currentText = el.textContent;
  const input = document.createElement('input');
  input.type = 'text';
  input.value = currentText;
  input.className = 'inline-edit';
  el.textContent = '';
  el.appendChild(input);
  input.focus();
  input.select();

  function commit() {
    const newText = input.value.trim();
    if (newText) {
      data.inbox[index] = newText;
      save();
    }
    render();
  }

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') {
      input.removeEventListener('blur', commit);
      render();
    }
  });
}

// ===== RUNNING LISTS =====
function getProjectNextActions(listKey) {
  const actions = [];
  for (const proj of data.projects) {
    if (!proj.active) continue;
    if (!proj.nextAction) continue;
    const ctx = proj.nextActionContext || 'computer';
    if (ctx !== listKey) continue;
    const actionId = 'pna-' + proj.id;
    // Check if this next action already exists as a regular task in the list
    const items = data.runningLists[listKey] || [];
    const alreadyExists = items.some(t => t.text === proj.nextAction || t.text === `[${proj.title}] ${proj.nextAction}`);
    if (!alreadyExists) {
      actions.push({ id: actionId, text: `[${proj.title}] ${proj.nextAction}`, done: false, isProjectAction: true, projectId: proj.id });
    }
  }
  return actions;
}

function renderListCard(key, meta) {
  const items = data.runningLists[key] || [];
  const projectActions = getProjectNextActions(key);
  const sublists = items.filter(t => t.items);
  const regular = items.filter(t => !t.items);
  const regularItems = [...regular.filter(t => !t.done), ...regular.filter(t => t.done), ...sublists];
  const allItems = [...projectActions, ...regularItems];
  const sublistOpen = sublists.reduce((n, s) => n + s.items.filter(i => !i.done).length, 0);
  const openCount = regular.filter(t => !t.done).length + projectActions.length + sublistOpen;
  return `
    <div class="list-card" style="border-color:${meta.border}">
      <div class="list-card-header" style="background:${meta.color};border-color:${meta.border}">
        <div class="list-card-title">${meta.emoji} ${meta.label}</div>
        <div class="list-card-count">${openCount} open</div>
      </div>
      <div class="list-card-items" data-type="list" data-parent="${key}">
        ${projectActions.map(task => `
          <div class="task-item project-next-action-item" style="font-style:italic;opacity:0.85;">
            <div class="task-checkbox"
                 onclick="completeProjectNextAction('${task.projectId}')">
            </div>
            <span class="task-text" style="font-style:italic;">📁 ${esc(task.text)}</span>
          </div>
        `).join('')}
        ${regularItems.map(task => task.items ? sublistHTML(task, key) : taskItemHTML(task, 'list', key)).join('')}
        ${!allItems.length ? '<p style="padding:12px;color:var(--text-dim);font-size:0.85rem;text-align:center;">Nothing here yet</p>' : ''}
      </div>
      <div class="add-task-row">
        <input class="add-task-input" placeholder="Add task..." id="add-list-${key}"
               onkeydown="if(event.key==='Enter')addToList('${key}')" />
        <button class="add-task-btn" onclick="addToList('${key}')">+</button>
      </div>
    </div>
  `;
}

  const mainHTML = MAIN_LISTS.map(key => renderListCard(key, LIST_META[key])).join('');
  const sideHTML = SIDE_BRAIN_LISTS.map(key => renderListCard(key, LIST_META[key])).join('');

  const collapsed = document.getElementById('sideBrainContent')?.style.display === 'none';
  document.getElementById('runningListsGrid').innerHTML = `

function addToList(listKey) {
  const input = document.getElementById(`add-list-${listKey}`);
  const text = input.value.trim();
  if (!text) return;
  data.runningLists[listKey].push({ id: uid(), text, done: false });
  input.value = '';
  save();
  render();
  document.getElementById(`add-list-${listKey}`).focus();
}

function toggleTask(type, parentId, taskId) {
  let tasks;
  if (type === 'list') {
    tasks = data.runningLists[parentId];
  } else {
    const proj = data.projects.find(p => p.id === parentId);
    if (proj) tasks = proj.tasks;
  }
  if (!tasks) return;
  const task = tasks.find(t => t.id === taskId);
  if (task) task.done = !task.done;
  save();
  render();
}

function completeProjectNextAction(projectId) {
  const proj = data.projects.find(p => p.id === projectId);
  if (!proj) return;
  const task = proj.tasks.find(t => t.text === proj.nextAction && !t.done);
  if (task) task.done = true;
  // Advance next action to the next undone task
  const nextUndone = proj.tasks.find(t => !t.done);
  proj.nextAction = nextUndone ? nextUndone.text : '';
  save();
  render();
}

function deleteTask(type, parentId, taskId) {
  if (type === 'list') {
    data.runningLists[parentId] = data.runningLists[parentId].filter(t => t.id !== taskId);
  } else {
    const proj = data.projects.find(p => p.id === parentId);
    if (proj) proj.tasks = proj.tasks.filter(t => t.id !== taskId);
  }
  save();
  render();
}

// ===== WEEKLY PLAN =====
let weekOffset = 0;

function getWeekDates(offset = 0) {
  const today = new Date();
  const dayOfWeek = today.getDay(); // 0=Sun
  const sunday = new Date(today);
  sunday.setDate(today.getDate() - dayOfWeek + (offset * 7));
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(sunday);
    d.setDate(sunday.getDate() + i);
    dates.push(d);
  }
  return dates;
}

function dateToKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function isToday(d) {
  const today = new Date();
  return d.getFullYear() === today.getFullYear() &&
         d.getMonth() === today.getMonth() &&
         d.getDate() === today.getDate();
}

function isPast(d) {
  const today = new Date();
  today.setHours(0,0,0,0);
  const compare = new Date(d);
  compare.setHours(0,0,0,0);
  return compare < today;
}

function formatWeekLabel(start, end) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if (start.getMonth() === end.getMonth()) {
    return `${months[start.getMonth()]} ${start.getDate()}\u2013${end.getDate()}, ${start.getFullYear()}`;
  }
  return `${months[start.getMonth()]} ${start.getDate()} \u2013 ${months[end.getMonth()]} ${end.getDate()}, ${end.getFullYear()}`;
}

function weekTaskHTML(task, dateKey) {
  const sourceEmoji = task.sourceType === 'proj' ? '📁' : (LIST_META[task.sourceParentId]?.emoji || '📋');
  const sourceLabel = getListLabel(task.sourceType, task.sourceParentId);
  return `
    <div class="task-item week-task ${task.done ? 'done' : ''}"
         draggable="true"
         data-task-id="${task.id}" data-type="week" data-parent="${dateKey}">
      <div class="task-checkbox ${task.done ? 'checked' : ''}"
           onclick="toggleWeekTask('${dateKey}','${task.id}')">
        ${task.done ? '✓' : ''}
      </div>
      <span class="task-text" onclick="startEditWeekTask('${dateKey}','${task.id}', this, event)">${esc(task.text)}</span>
      ${task.sourceType !== 'week' ? `<span class="week-task-source" title="From: ${esc(sourceLabel)}">${sourceEmoji}</span>` : ''}
      <button class="task-move" onclick="showWeekMovePicker('${dateKey}','${task.id}', this, event)" title="Add to list/project">↗</button>
      ${task.sourceType !== 'week' ? `<button class="task-return" onclick="returnWeekTask('${dateKey}','${task.id}')" title="Return to ${esc(sourceLabel)}">↩</button>` : ''}
      <button class="task-delete" onclick="deleteWeekTask('${dateKey}','${task.id}')" title="Delete task">×</button>
    </div>
  `;
}

function renderWeekPlan() {
  const container = document.getElementById('weekPlanContainer');
  if (!container) return;

  const dates = getWeekDates(weekOffset);
  const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const deepDays = data.weekPlanSettings?.deepWorkDays || [2, 3, 4];

  // Check for overdue tasks (only on current week view)
  let overdueCount = 0;
  if (weekOffset === 0) {
    for (const [dateKey, tasks] of Object.entries(data.weekPlan || {})) {
      const d = new Date(dateKey + 'T00:00:00');
      if (isPast(d)) {
        overdueCount += tasks.filter(t => !t.done).length;
      }
    }
  }

  const weekLabel = formatWeekLabel(dates[0], dates[6]);

  let html = `
    <div class="week-plan-header">
      <button class="btn-ghost" onclick="changeWeek(-1)">\u2190 Prev</button>
      <h2 class="week-plan-title">${weekLabel}</h2>
      <button class="btn-ghost" onclick="changeWeek(1)">Next \u2192</button>
    </div>
  `;

  if (overdueCount > 0) {
    html += `
      <div class="week-plan-overdue">
        <span>\u26A0\uFE0F ${overdueCount} overdue task${overdueCount > 1 ? 's' : ''} from past days</span>
        <button class="btn-ghost" onclick="carryForwardOverdue()">Carry to Today</button>
      </div>
    `;
  }

  const colTemplate = dates.map((d, i) => deepDays.includes(i) ? '1.5fr' : '1fr').join(' ');

  html += `<div class="week-strip" style="grid-template-columns: ${colTemplate}">`;

  for (let i = 0; i < 7; i++) {
    const d = dates[i];
    const dateKey = dateToKey(d);
    const tasks = data.weekPlan[dateKey] || [];
    const isDeep = deepDays.includes(i);
    const todayClass = isToday(d) ? ' day-today' : '';
    const pastClass = isPast(d) ? ' day-past' : '';
    const deepClass = isDeep ? ' day-deep' : '';

    html += `
      <div class="day-column${todayClass}${pastClass}${deepClass}">
        <div class="day-header">
          <div class="day-name">${dayNames[i]}</div>
          <div class="day-date">${d.getMonth()+1}/${d.getDate()}</div>
          ${isDeep
            ? `<div class="deep-work-badge" title="Deep work day \u2014 click to toggle" onclick="toggleDeepDay(${i})">🔥</div>`
            : `<div class="deep-work-toggle" title="Click to make deep work day" onclick="toggleDeepDay(${i})">+🔥</div>`
          }
        </div>
        <div class="day-slot" data-date="${dateKey}" data-type="week" data-parent="${dateKey}">
          ${tasks.filter(t => !t.done).map(task => weekTaskHTML(task, dateKey)).join('')}
          <input class="week-add-input" placeholder="+ add task"
                 onkeydown="if(event.key==='Enter')addWeekTask('${dateKey}',this)" />
        </div>
      </div>
    `;
  }

  html += '</div>';
  container.innerHTML = html;
}

function toggleWeekTask(dateKey, taskId) {
  const tasks = data.weekPlan[dateKey];
  if (!tasks) return;
  const task = tasks.find(t => t.id === taskId);
  if (task) task.done = !task.done;
  save();
  render();
}

function deleteWeekTask(dateKey, taskId) {
  const tasks = data.weekPlan[dateKey];
  if (!tasks) return;
  const idx = tasks.findIndex(t => t.id === taskId);
  if (idx === -1) return;
  tasks.splice(idx, 1);
  save();
  render();
}

function returnWeekTask(dateKey, taskId) {
  const tasks = data.weekPlan[dateKey];
  if (!tasks) return;
  const idx = tasks.findIndex(t => t.id === taskId);
  if (idx === -1) return;
  const [task] = tasks.splice(idx, 1);

  // Return to source list/project
  const targetArr = getTaskArray(task.sourceType, task.sourceParentId);
  if (targetArr) {
    targetArr.push({ id: task.taskId || uid(), text: task.text, done: task.done });
  } else {
    // Source no longer exists, put in inbox
    data.inbox.push(task.text);
  }

  save();
  render();
  toast(`Returned to ${getListLabel(task.sourceType, task.sourceParentId)}`);
}

function carryForwardOverdue() {
  const todayKey = dateToKey(new Date());
  if (!data.weekPlan[todayKey]) data.weekPlan[todayKey] = [];

  for (const [dateKey, tasks] of Object.entries(data.weekPlan)) {
    const d = new Date(dateKey + 'T00:00:00');
    if (isPast(d)) {
      const undone = tasks.filter(t => !t.done);
      const done = tasks.filter(t => t.done);
      data.weekPlan[dateKey] = done;
      data.weekPlan[todayKey].push(...undone);
    }
  }
  save();
  render();
  toast('Overdue tasks moved to today');
}

// ===== WEEKLY PLAN: INLINE ADD =====
function addWeekTask(dateKey, inputEl) {
  const text = inputEl.value.trim();
  if (!text) return;
  if (!data.weekPlan[dateKey]) data.weekPlan[dateKey] = [];
  data.weekPlan[dateKey].push({
    id: uid(),
    text,
    done: false,
    sourceType: 'week',
    sourceParentId: dateKey
  });
  inputEl.value = '';
  save();
  renderWeekPlan();
  // Re-focus the input for that day
  const slot = document.querySelector(`.day-slot[data-date="${dateKey}"]`);
  if (slot) slot.querySelector('.week-add-input')?.focus();
}

// ===== WEEKLY PLAN: MOVE TO LIST/PROJECT =====
function showWeekMovePicker(dateKey, taskId, btn, event) {
  event.stopPropagation();
  closeMovePicker();

  const rect = btn.getBoundingClientRect();
  const destinations = [];

  // Running lists
  for (const [key, meta] of Object.entries(LIST_META)) {
    destinations.push({ label: `${meta.emoji} ${meta.label}`, type: 'list', parentId: key });
  }
  // Projects
  for (const proj of data.projects) {
    destinations.push({ label: `📁 ${proj.title}`, type: 'proj', parentId: proj.id });
  }

  const overlay = document.createElement('div');
  overlay.className = 'move-picker-overlay';
  overlay.onclick = closeMovePicker;

  const picker = document.createElement('div');
  picker.className = 'move-picker';
  picker.id = 'movePicker';

  picker.innerHTML = `
    <div class="move-picker-title">Add to…</div>
    ${destinations.map((d, i) => {
      const divider = (i > 0 && d.type !== destinations[i-1].type) ? '<div class="move-picker-divider"></div>' : '';
      return `${divider}<div class="move-picker-item"
        onclick="addWeekTaskToTarget('${dateKey}','${taskId}','${d.type}','${d.parentId}')">
        ${d.label}
      </div>`;
    }).join('')}
  `;

  document.body.appendChild(overlay);
  document.body.appendChild(picker);

  let left = rect.right - 200;

  if (top + 320 > window.innerHeight) top = rect.top - 320;
  picker.style.top = top + 'px';
  picker.style.left = left + 'px';
}

function addWeekTaskToTarget(dateKey, taskId, toType, toParent) {
  closeMovePicker();
  const tasks = data.weekPlan[dateKey];
  if (!tasks) return;
  const task = tasks.find(t => t.id === taskId);
  if (!task) return;

  const targetArr = getTaskArray(toType, toParent);
  if (!targetArr) return;

  // Check for duplicates
  const dupes = findDuplicates(task.text, targetArr);
  if (dupes.length > 0) {
    showDupeModal(task, dupes[0], toType, toParent, targetArr, dateKey);
    return;
  }

  // No duplicates — add it
  targetArr.push({ id: uid(), text: task.text, done: false });
  save();
  render();
  const label = getListLabel(toType, toParent);
  toast(`Added to ${label}`);
}

// ===== DUPLICATE DETECTION =====
function findDuplicates(text, targetArr) {
  const normalize = s => s.toLowerCase().replace(/[^a-z0-9 ]/g, '').trim();
  const newNorm = normalize(text);
  const newWords = newNorm.split(/\s+/).filter(w => w.length > 2);

  return targetArr.filter(t => {
    const existNorm = normalize(t.text);
    // Exact match
    if (existNorm === newNorm) return true;
    // High word overlap (>60% of words match)
    const existWords = existNorm.split(/\s+/).filter(w => w.length > 2);
    if (!newWords.length || !existWords.length) return false;
    const overlap = newWords.filter(w => existWords.includes(w)).length;
    return overlap / Math.max(newWords.length, existWords.length) > 0.6;
  });
}

function showDupeModal(newTask, existingTask, toType, toParent, targetArr, dateKey) {
  const label = getListLabel(toType, toParent);

  const overlay = document.createElement('div');
  overlay.className = 'dupe-overlay';
  overlay.id = 'dupeOverlay';

  overlay.innerHTML = `
    <div class="dupe-modal">
      <h3>Similar task found in ${esc(label)}</h3>
      <p>A similar item already exists:</p>
      <div class="dupe-existing">📋 <strong>Existing:</strong> ${esc(existingTask.text)}</div>
      <div class="dupe-new">✨ <strong>New:</strong> ${esc(newTask.text)}</div>
      <div class="dupe-actions">
        <button onclick="dupeReplace('${existingTask.id}','${toType}','${toParent}','${esc(newTask.text).replace(/'/g, "\\'")}')">Replace existing</button>
        <button onclick="dupeAddAnyway('${toType}','${toParent}','${esc(newTask.text).replace(/'/g, "\\'")}')">Add anyway</button>
        <button onclick="dupeCancel()">Cancel</button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);
}

function dupeReplace(existId, toType, toParent, newText) {
  closeDupeModal();
  const targetArr = getTaskArray(toType, toParent);
  if (!targetArr) return;
  const task = targetArr.find(t => t.id === existId);
  if (task) {
    task.text = newText;
    task.done = false;
  }
  save();
  render();
  toast('Replaced existing task');
}

function dupeAddAnyway(toType, toParent, text) {
  closeDupeModal();
  const targetArr = getTaskArray(toType, toParent);
  if (!targetArr) return;
  targetArr.push({ id: uid(), text, done: false });
  save();
  render();
  const label = getListLabel(toType, toParent);
  toast(`Added to ${label}`);
}

function dupeCancel() {
  closeDupeModal();
}

function closeDupeModal() {
  const el = document.getElementById('dupeOverlay');
  if (el) el.remove();
}

function changeWeek(delta) {
  weekOffset += delta;
  renderWeekPlan();
}

function toggleDeepDay(dayIndex) {
  if (!data.weekPlanSettings) data.weekPlanSettings = { deepWorkDays: [2, 3, 4] };
  const idx = data.weekPlanSettings.deepWorkDays.indexOf(dayIndex);
  if (idx >= 0) {
    data.weekPlanSettings.deepWorkDays.splice(idx, 1);
  } else {
    data.weekPlanSettings.deepWorkDays.push(dayIndex);
    data.weekPlanSettings.deepWorkDays.sort();
  }
  save();
  render();
}

function startEditWeekTask(dateKey, taskId, el, event) {
  event.stopPropagation();
  if (el.querySelector('input')) return;
  const currentText = el.textContent;
  const input = document.createElement('input');
  input.type = 'text';
  input.value = currentText;
  input.className = 'inline-edit';
  el.textContent = '';
  el.appendChild(input);
  const row = el.closest('.task-item');
  if (row) row.setAttribute('draggable', 'false');
  input.focus();
  input.select();

  function commit() {
    const newText = input.value.trim();
    if (newText) {
      const tasks = data.weekPlan[dateKey] || [];
      const task = tasks.find(t => t.id === taskId);
      if (task) task.text = newText;
      save();
    }
    render();
  }

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.removeEventListener('blur', commit); render(); }
  });
}

// ===== COMPLETED SECTION =====
function renderCompleted() {
  const section = document.getElementById('completedSection');
  const body = document.getElementById('completedBody');
  const countEl = document.getElementById('completedCount');

  const groups = [];

  // Gather from running lists
  for (const [key, items] of Object.entries(data.runningLists)) {
    const meta = LIST_META[key];
    const done = items.filter(t => t.done);
    if (done.length) {
      groups.push({
        label: `${meta.emoji} ${meta.label}`,
        items: done.map(t => ({ ...t, type: 'list', parentId: key }))
      });
    }
  }

  // Gather from projects
  for (const proj of data.projects) {
    const done = proj.tasks.filter(t => t.done);
    if (done.length) {
      groups.push({
        label: `📁 ${proj.title}`,
        items: done.map(t => ({ ...t, type: 'proj', parentId: proj.id }))
      });
    }
  }

  // Gather from weekly plan
  const weekDone = [];
  for (const [dateKey, tasks] of Object.entries(data.weekPlan || {})) {
    for (const task of tasks) {
      if (task.done) {
        weekDone.push({ ...task, type: 'week', parentId: dateKey, dateLabel: dateKey });
      }
    }
  }
  if (weekDone.length) {
    groups.push({
      label: '📅 Weekly Plan',
      items: weekDone
    });
  }

  const totalDone = groups.reduce((sum, g) => sum + g.items.length, 0);
  countEl.textContent = totalDone;

  if (!totalDone) {
    section.style.display = 'none';
    return;
  }

  section.style.display = '';

  body.innerHTML = groups.map(g => `
    <div class="completed-group-label">${g.label}</div>
    ${g.items.map(item => `
      <div class="completed-item">
        <div class="task-checkbox checked"
             onclick="${item.type === 'week' ? `toggleWeekTask('${item.parentId}','${item.id}')` : `toggleTask('${item.type}','${item.parentId}','${item.id}')`}"
             style="cursor:pointer;">✓</div>
        <span class="completed-item-text">${esc(item.text)}</span>
      </div>
    `).join('')}
  `).join('');
}

function toggleCompletedSection() {
  document.getElementById('completedSection').classList.toggle('expanded');
}

// ===== TABS =====
function switchTab(tabName) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
  document.querySelectorAll('.tab-content').forEach(tc => tc.classList.toggle('active', tc.id === `tab-${tabName}`));
}

// ===== EXPORT / IMPORT =====
function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `life-checklist-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  toast('Data exported!');
}

function importData() {
  document.getElementById('importInput').click();
}

function handleImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      data = JSON.parse(e.target.result);
      save();
      render();
      toast('Data imported!');
    } catch {
      toast('Invalid JSON file');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ===== UTILS =====
function esc(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 2500);
}

// Close modal on overlay click
document.getElementById('newProjectModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal('newProjectModal');
});

// Keyboard: Tab inserts a tab character in brain dump, Ctrl/Cmd+Enter to process
document.getElementById('dumpArea').addEventListener('keydown', function(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = this.selectionStart;
    const end = this.selectionEnd;
    this.value = this.value.substring(0, start) + '\t' + this.value.substring(end);
    this.selectionStart = this.selectionEnd = start + 1;
  }
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
    processDump();
  }
});

// ===== MOVE TO PICKER =====
function showMovePicker(type, parentId, taskId, btn, event) {
  event.stopPropagation();
  closeMovePicker();

  const rect = btn.getBoundingClientRect();

  // Build list of destinations
  const destinations = [];

  // Running lists
  for (const [key, meta] of Object.entries(LIST_META)) {
    destinations.push({
      label: `${meta.emoji} ${meta.label}`,
      type: 'list',
      parentId: key,
      isCurrent: type === 'list' && parentId === key
    });
  }

  // Projects
  for (const proj of data.projects) {
    destinations.push({
      label: `📁 ${proj.title}`,
      type: 'proj',
      parentId: proj.id,
      isCurrent: type === 'proj' && parentId === proj.id
    });
  }

  const overlay = document.createElement('div');
  overlay.className = 'move-picker-overlay';
  overlay.onclick = closeMovePicker;

  const picker = document.createElement('div');
  picker.className = 'move-picker';
  picker.id = 'movePicker';

  picker.innerHTML = `
    <div class="move-picker-title">Move to…</div>
    ${destinations.map((d, i) => {
      const divider = (i > 0 && d.type !== destinations[i-1].type) ? '<div class="move-picker-divider"></div>' : '';
      return `${divider}<div class="move-picker-item ${d.isCurrent ? 'current' : ''}"
        onclick="executeMove('${type}','${parentId}','${taskId}','${d.type}','${d.parentId}')">
        ${d.label}${d.isCurrent ? ' <span style="font-size:0.7rem;color:var(--text-dim)">(current)</span>' : ''}
      </div>`;
    }).join('')}
  `;

  document.body.appendChild(overlay);
  document.body.appendChild(picker);

  // Position the picker near the button
  let top = rect.bottom + 4;
  let left = rect.right - 200;
  if (left < 8) left = 8;
  if (top + 320 > window.innerHeight) top = rect.top - 320;
  picker.style.top = top + 'px';
  picker.style.left = left + 'px';
}

function closeMovePicker() {
  const picker = document.getElementById('movePicker');
  if (picker) picker.remove();
  const overlay = document.querySelector('.move-picker-overlay');
  if (overlay) overlay.remove();
}

function executeMove(fromType, fromParent, taskId, toType, toParent) {
  closeMovePicker();
  if (fromType === toType && fromParent === toParent) return;

  const sourceArr = getTaskArray(fromType, fromParent);
  if (!sourceArr) return;
  const idx = sourceArr.findIndex(t => t.id === taskId);
  if (idx === -1) return;

  const [task] = sourceArr.splice(idx, 1);
  const targetArr = getTaskArray(toType, toParent);
  if (!targetArr) {
    sourceArr.splice(idx, 0, task);
    return;
  }

  targetArr.push(task);
  save();
  render();

  if (toType === 'proj') {
    const projEl = document.getElementById(`project-${toParent}`);
    if (projEl) projEl.classList.add('expanded');
  }

  toast(`Moved to ${getListLabel(toType, toParent)}`);
}

// ===== DRAG AND DROP =====
let dragState = null;
let dropTarget = null; // Tracks the precise drop position during dragover

function getTaskArray(type, parentId) {
  if (type === 'list') return data.runningLists[parentId];
  if (type === 'proj') {
    const proj = data.projects.find(p => p.id === parentId);
    return proj ? proj.tasks : null;
  }
  if (type === 'week') return data.weekPlan?.[parentId] || null;
  return null;
}

function getListLabel(type, parentId) {
  if (type === 'list') {
    const meta = LIST_META[parentId];
    return meta ? `${meta.emoji} ${meta.label}` : parentId;
  }
  if (type === 'proj') {
    const proj = data.projects.find(p => p.id === parentId);
    return proj ? `📁 ${proj.title}` : parentId;
  }
  if (type === 'week') return `📅 ${parentId}`;
  return parentId;
}

function clearAllDropIndicators() {
  document.querySelectorAll('.task-item').forEach(el => {
    el.classList.remove('drag-over-top', 'drag-over-bottom');
  });
  document.querySelectorAll('.drag-target-active').forEach(el => {
    el.classList.remove('drag-target-active');
  });
}

function highlightDropTarget(el) {
  document.querySelectorAll('.drag-target-active').forEach(e => e.classList.remove('drag-target-active'));
  el.classList.add('drag-target-active');
}

document.addEventListener('dragstart', function(e) {
  const item = e.target.closest('.task-item[draggable]');
  if (!item) return;
  dragState = {
    taskId: item.dataset.taskId,
    type: item.dataset.type,
    parentId: item.dataset.parent
  };
  // Store task object reference
  const sourceArr = getTaskArray(dragState.type, dragState.parentId);
  if (sourceArr) {
    dragState.taskObj = sourceArr.find(t => t.id === dragState.taskId);
  }
  item.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', item.dataset.taskId);
});

document.addEventListener('dragover', function(e) {
  if (!dragState) return;

  // Case A: Hovering over a task-item
  const item = e.target.closest('.task-item[draggable]');
  if (item) {
    if (item.dataset.taskId === dragState.taskId) return;
    const targetType = item.dataset.type;
    const targetParent = item.dataset.parent;
    const rect = item.getBoundingClientRect();
    const midY = rect.top + rect.height / 2;
    const above = e.clientY < midY;

    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';

    // Store precise drop target for the drop handler
    dropTarget = {
      taskId: item.dataset.taskId,
      type: targetType,
      parent: targetParent,
      above: above,
      element: item
    };

    // Visual indicators
    item.parentElement.querySelectorAll('.task-item').forEach(el => {
      el.classList.remove('drag-over-top', 'drag-over-bottom');
    });
    item.classList.add(above ? 'drag-over-top' : 'drag-over-bottom');

    // For cross-list, also highlight the container
    if (targetType !== dragState.type || targetParent !== dragState.parentId) {
      const container = item.closest('.list-card-items, .day-slot');
      if (container) highlightDropTarget(container);
    } else {
      document.querySelectorAll('.drag-target-active').forEach(el => el.classList.remove('drag-target-active'));
    }
    return;
  }

  // Case B: Hovering over a day-slot (weekly plan)
  const daySlot = e.target.closest('.day-slot');
  if (daySlot) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    highlightDropTarget(daySlot);
    dropTarget = {
      type: 'week',
      parent: daySlot.dataset.date,
      element: daySlot,
      taskId: null,
      above: false
    };
    return;
  }

  // Case C: Hovering over an empty list container
  const container = e.target.closest('.list-card-items');
  if (container) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    highlightDropTarget(container);
    dropTarget = {
      type: container.dataset.type,
      parent: container.dataset.parent,
      element: container,
      taskId: null,
      above: false
    };
    return;
  }
});

document.addEventListener('dragleave', function(e) {
  const item = e.target.closest('.task-item[draggable]');
  if (item) {
    item.classList.remove('drag-over-top', 'drag-over-bottom');
  }
  const container = e.target.closest('.list-card-items, .day-slot');
  if (container && e.relatedTarget && !container.contains(e.relatedTarget)) {
    container.classList.remove('drag-target-active');
  }
});

document.addEventListener('drop', function(e) {
  e.preventDefault();
  clearAllDropIndicators();
  if (!dragState || !dropTarget) { dragState = null; dropTarget = null; return; }

  const dt = dropTarget;

  // Drop onto a day slot (weekly plan)
  if (dt.type === 'week') {
    const daySlotEl = dt.element.closest ? dt.element : document.querySelector(`.day-slot[data-date="${dt.parent}"]`);
    if (daySlotEl) handleDropToWeekPlan(daySlotEl, null, e);
    dragState = null;
    dropTarget = null;
    return;
  }

  // Same list: reorder
  if (dt.type === dragState.type && dt.parent === dragState.parentId && dt.taskId) {
    handleSameListReorder(dt);
  } else if (dt.type && dt.parent) {
    // Cross-list move
    handleCrossListMove(dt.type, dt.parent, dt);
  }

  dragState = null;
  dropTarget = null;
});

function handleSameListReorder(dt) {
  const tasks = getTaskArray(dragState.type, dragState.parentId);
  if (!tasks) return;

  const fromIdx = tasks.findIndex(t => t.id === dragState.taskId);
  let toIdx = tasks.findIndex(t => t.id === dt.taskId);
  if (fromIdx === -1 || toIdx === -1 || fromIdx === toIdx) return;

  const dropBelow = !dt.above;
  const [moved] = tasks.splice(fromIdx, 1);
  toIdx = tasks.findIndex(t => t.id === dt.taskId);
  tasks.splice(dropBelow ? toIdx + 1 : toIdx, 0, moved);

  save();
  render();
  if (dragState.type === 'proj') {
    const projEl = document.getElementById(`project-${dragState.parentId}`);
    if (projEl) projEl.classList.add('expanded');
  }
}

function handleCrossListMove(targetType, targetParent, dt) {
  let sourceArr, movedTask, fromIdx;

  if (dragState.type === 'week') {
    sourceArr = data.weekPlan[dragState.parentId];
    if (!sourceArr) return;
    fromIdx = sourceArr.findIndex(t => t.id === dragState.taskId);
    if (fromIdx === -1) return;
    const [weekTask] = sourceArr.splice(fromIdx, 1);
    movedTask = { id: weekTask.taskId || uid(), text: weekTask.text, done: weekTask.done };
  } else {
    sourceArr = getTaskArray(dragState.type, dragState.parentId);
    if (!sourceArr) return;
    fromIdx = sourceArr.findIndex(t => t.id === dragState.taskId);
    if (fromIdx === -1) return;
    [movedTask] = sourceArr.splice(fromIdx, 1);
  }

  const targetArr = getTaskArray(targetType, targetParent);
  if (!targetArr) {
    if (dragState.type === 'week') {
      data.weekPlan[dragState.parentId].splice(fromIdx, 0, movedTask);
    } else {
      sourceArr.splice(fromIdx, 0, movedTask);
    }
    return;
  }

  // Use stored dropTarget position for precise placement
  if (dt.taskId) {
    let toIdx = targetArr.findIndex(t => t.id === dt.taskId);
    if (toIdx === -1) {
      targetArr.push(movedTask);
    } else {
      const dropBelow = !dt.above;
      targetArr.splice(dropBelow ? toIdx + 1 : toIdx, 0, movedTask);
    }
  } else {
    targetArr.push(movedTask);
  }

  save();
  render();
  if (targetType === 'proj') {
    const projEl = document.getElementById(`project-${targetParent}`);
    if (projEl) projEl.classList.add('expanded');
  }
  if (dragState.type === 'proj') {
    const projEl = document.getElementById(`project-${dragState.parentId}`);
    if (projEl) projEl.classList.add('expanded');
  }
  toast(`Moved to ${getListLabel(targetType, targetParent)}`);
}

function handleDropToWeekPlan(daySlotEl, targetItem, e) {
  const dateKey = daySlotEl.dataset.date;
  if (!dateKey) return;

  // Moving within weekly plan (day to day)
  if (dragState.type === 'week') {
    const sourceTasks = data.weekPlan[dragState.parentId];
    if (!sourceTasks) return;
    const idx = sourceTasks.findIndex(t => t.id === dragState.taskId);
    if (idx === -1) return;
    const [task] = sourceTasks.splice(idx, 1);
    if (!data.weekPlan[dateKey]) data.weekPlan[dateKey] = [];
    data.weekPlan[dateKey].push(task);
    save();
    render();
    return;
  }

  // Moving FROM a list/project TO the weekly plan
  const sourceArr = getTaskArray(dragState.type, dragState.parentId);
  if (!sourceArr) return;
  const fromIdx = sourceArr.findIndex(t => t.id === dragState.taskId);
  if (fromIdx === -1) return;
  const [movedTask] = sourceArr.splice(fromIdx, 1);

  if (!data.weekPlan[dateKey]) data.weekPlan[dateKey] = [];
  data.weekPlan[dateKey].push({
    id: uid(),
    taskId: movedTask.id,
    text: movedTask.text,
    sourceType: dragState.type,
    sourceParentId: dragState.parentId,
    done: movedTask.done
  });

  save();
  render();
  // Re-expand project if dragged from one
  if (dragState.type === 'proj') {
    const projEl = document.getElementById(`project-${dragState.parentId}`);
    if (projEl) projEl.classList.add('expanded');
  }
  toast(`Scheduled for ${dateKey}`);
}

document.addEventListener('dragend', function(e) {
  dragState = null;
  dropTarget = null;
  clearAllDropIndicators();
  document.querySelectorAll('.task-item').forEach(el => {
    el.classList.remove('dragging', 'drag-over-top', 'drag-over-bottom');
  });
});

// ===== INLINE EDITING =====
function startEditTask(type, parentId, taskId, el, event) {
  event.stopPropagation();
  if (el.querySelector('input')) return;
  const currentText = el.textContent;
  const input = document.createElement('input');
  input.type = 'text';
  input.value = currentText;
  input.className = 'inline-edit';
  el.textContent = '';
  el.appendChild(input);
  // Disable drag while editing
  const row = el.closest('.task-item');
  if (row) row.setAttribute('draggable', 'false');
  input.focus();
  input.select();

  function commit() {
    const newText = input.value.trim();
    if (newText) {
      const tasks = getTaskArray(type, parentId);
      if (tasks) {
        const task = tasks.find(t => t.id === taskId);
        if (task) task.text = newText;
      }
      save();
    }
    render();
    if (type === 'proj') {
      const projEl = document.getElementById(`project-${parentId}`);
      if (projEl) projEl.classList.add('expanded');
    }
  }

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') {
      input.removeEventListener('blur', commit);
      render();
      if (type === 'proj') {
        const projEl = document.getElementById(`project-${parentId}`);
        if (projEl) projEl.classList.add('expanded');
      }
    }
  });
}

function startEditProjectTitle(projId, el) {
  if (el.querySelector('input')) return;
  const currentText = el.textContent;
  const input = document.createElement('input');
  input.type = 'text';
  input.value = currentText;
  input.className = 'inline-edit';
  input.style.fontWeight = '700';
  input.style.fontSize = '1.05rem';
  el.textContent = '';
  el.appendChild(input);
  input.focus();
  input.select();

  function commit() {
    const newText = input.value.trim().replace(/^📁\s*/, '');
    if (newText) {
      const proj = data.projects.find(p => p.id === projId);
      if (proj) proj.title = newText;
      save();
    }
    render();
    const projEl = document.getElementById(`project-${projId}`);
    if (projEl) projEl.classList.add('expanded');
  }

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') {
      input.removeEventListener('blur', commit);
      render();
      const projEl = document.getElementById(`project-${projId}`);
      if (projEl) projEl.classList.add('expanded');
    }
  });
}
